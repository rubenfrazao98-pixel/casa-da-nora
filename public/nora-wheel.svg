<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="wood" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5c4033" />
      <stop offset="100%" stop-color="#3e2723" />
    </radialGradient>
  </defs>
  <g transform="translate(200,200)">
    <!-- Outer Rim -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#wood)" stroke-width="20" />
    <circle cx="0" cy="0" r="190" fill="none" stroke="#2a1a17" stroke-width="2" />
    <circle cx="0" cy="0" r="170" fill="none" stroke="#2a1a17" stroke-width="2" />
    
    <!-- Inner Rim -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="url(#wood)" stroke-width="15" />
    
    <!-- Spokes & Paddles -->
    <!-- 12 spokes, 30 degrees apart -->
    <g stroke="url(#wood)" stroke-width="12" stroke-linecap="round">
      <line x1="0" y1="-20" x2="0" y2="-180" />
      <line x1="0" y1="20" x2="0" y2="180" />
      <line x1="-20" y1="0" x2="-180" y2="0" />
      <line x1="20" y1="0" x2="180" y2="0" />
      <line x1="0" y1="-20" x2="0" y2="-180" transform="rotate(30)" />
      <line x1="0" y1="-20" x2="0" y2="-180" transform="rotate(60)" />
      <line x1="0" y1="-20" x2="0" y2="-180" transform="rotate(120)" />
      <line x1="0" y1="-20" x2="0" y2="-180" transform="rotate(150)" />
      <line x1="0" y1="20" x2="0" y2="180" transform="rotate(30)" />
      <line x1="0" y1="20" x2="0" y2="180" transform="rotate(60)" />
      <line x1="0" y1="20" x2="0" y2="180" transform="rotate(120)" />
      <line x1="0" y1="20" x2="0" y2="180" transform="rotate(150)" />
    </g>

    <!-- Center Hub -->
    <circle cx="0" cy="0" r="30" fill="#3e2723" />
    <circle cx="0" cy="0" r="15" fill="#1a100e" />
    <circle cx="0" cy="0" r="5" fill="#795548" />
  </g>
</svg>